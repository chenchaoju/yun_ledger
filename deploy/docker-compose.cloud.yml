# 云记账上云使用 app_stack 统一编排。
# 服务器部署位置：/opt/app_stack/docker-compose.yml
# 启动目录：cd /opt/app_stack && docker compose up -d --build
# 不建议在 /opt/yun_ledger 单独启动 docker-compose，避免重复创建 MySQL/Nginx/API 容器。
services:
  mysql:
    image: mysql:8.0
    container_name: yun_ledger_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: finance_data
      MYSQL_ROOT_HOST: "%"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - /opt/app_stack/mysql_data:/var/lib/mysql
    networks:
      - app_stack_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: /opt/yun_ledger/backend
    container_name: yun_ledger_api
    restart: always
    environment:
      APP_NAME: 云记账
      ENVIRONMENT: production
      APP_ENV: production
      SECRET_KEY: change-this-secret-key
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/finance_data?charset=utf8mb4
      CORS_ORIGINS: http://117.72.246.88,http://117.72.246.88:80
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_stack_net

  exception_workflow:
    build: /opt/exception_workflow
    container_name: exception_workflow_app
    restart: always
    volumes:
      - /opt/exception_workflow/uploads:/app/uploads
      - /opt/exception_workflow/outputs:/app/outputs
    networks:
      - app_stack_net

  special_material_converter:
    build: /opt/special_material_converter
    container_name: special_material_converter_app
    restart: always
    networks:
      - app_stack_net

  file_assistant:
    build: /opt/file_assistant_cloud
    container_name: file_assistant_app
    restart: always
    environment:
      APP_ENV: production
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/file_assistant_data?charset=utf8mb4
      CORS_ORIGINS: http://117.72.246.88,http://117.72.246.88:80
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_stack_net

  web:
    image: nginx:alpine
    container_name: app_stack_web
    restart: always
    ports:
      - "80:80"
    volumes:
      - /opt/app_stack/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/yun_ledger/pc_frontend/dist:/usr/share/nginx/html/pc:ro
      - /opt/yun_ledger/mobile_frontend/dist:/usr/share/nginx/html/mobile:ro
      - /opt/file_assistant_cloud/frontend:/usr/share/nginx/html/file:ro
    depends_on:
      - api
      - exception_workflow
      - special_material_converter
      - file_assistant
    networks:
      - app_stack_net

networks:
  app_stack_net:
    driver: bridge
